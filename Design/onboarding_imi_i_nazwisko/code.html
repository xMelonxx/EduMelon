<html lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    tailwind.config = {
      darkMode: "class",

        extend: {
          "colors": {

            "surface": "#f6faf6",

            "on-primary-container": "#710116",
            "outline": "#8b7170",
            "surface-variant": "#dfe3e0",
            "inverse-primary": "#ffb3b2",
            "error": "#ba1a1a",
            "tertiary-fixed": "#dde4e3",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#dfbfbe",
            "surface-container-highest": "#dfe3e0",
            "inverse-surface": "#2d312f",
            "surface-container-high": "#e5e9e5",
            "surface-tint": "#ab323a",
            "on-surface": "#181d1a",
            "tertiary-fixed-dim": "#c1c8c7",
            "surface-container-low": "#f1f5f1",
            "inverse-on-surface": "#eef2ee",
            "on-tertiary-fixed-variant": "#414848",
            "primary": "#ab323a",
            "secondary": "#296a46",
            "secondary-container": "#aef2c4",
            "on-secondary": "#ffffff",

            "primary-fixed-dim": "#ffb3b2",
            "on-secondary-fixed-variant": "#095230",
            "background": "#f6faf6",
            "surface-container": "#ebefeb",
            "on-error": "#ffffff",
            "secondary-fixed-dim": "#92d5a9",
            "tertiary": "#596060",
            "on-background": "#181d1a",
            "surface-bright": "#f6faf6",
            "surface-dim": "#d7dbd7",
            "on-surface-variant": "#584141",
            "on-primary-fixed-variant": "#8a1925"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f6faf6;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-melon-gradient {
      background: linear-gradient(135deg, #ab323a 0%, #ff7074 100%);
    }
    .glass-effect {
      background: rgba(246, 250, 246, 0.8);
      backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="text-on-surface min-h-screen flex flex-col items-center justify-center p-6 md:p-12 overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Abstract Background Elements (The Living Greenhouse) -->
<div class="fixed top-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-secondary-container/30 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30vw] h-[30vw] bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Onboarding Content Canvas -->
<main class="relative z-10 w-full max-w-2xl flex flex-col items-center">
<!-- Header Illustration / Logo -->
<div class="mb-12 relative group">
<div class="absolute -inset-4 bg-primary-container/10 rounded-full blur-2xl group-hover:bg-primary-container/20 transition-all duration-700"></div>
<div class="relative w-32 h-32 bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(171,50,58,0.08)] flex items-center justify-center overflow-hidden">
<img alt="EduMelon Logo" class="w-16 h-16" data-alt="a playful and vibrant organic melon illustration with friendly features in a soft pastel aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDC1UHvE526D0PNcJ3WjrTgMsydLHPKN2UCiNpRUMGlITge7w57nobn1spaTstrioVnvQDSC9sQwqjML3RiH5rhhmEYOJfcK7XTN6yc89twENFYJ8C1f05b6EdMkCbFgW8HA83eXiWNmSjXg4wlDBapJ7Lqe_K8JbTA9SSsm_mhZ7h-qe-nOjY8wVsiHqFgGACR4EfmFBZ8Fs4LifRFX8CkNamuyGjNw4KciKnJQOpJ2266ftpauALv47DR3qhCLp2FTwagTNQQTPQ"/>
</div>
</div>
<!-- Title Section -->
<div class="text-center mb-10">
<h1 class="text-5xl md:text-6xl font-extrabold text-on-surface tracking-tight mb-4">
        Witaj w <span class="text-primary leading-none">EduMelon!</span>
</h1>
<p class="text-on-surface-variant text-lg max-w-md mx-auto leading-relaxed">
        Zacznijmy od kilku szczegółów, aby Twój profil rozkwitł naturalnie.
      </p>
</div>
<!-- Form Section -->
<div class="w-full bg-surface-container-low rounded-xl p-8 md:p-10 shadow-[0_12px_32px_rgba(0,0,0,0.02)] border border-white/40">
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- First Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-on-surface-variant uppercase tracking-[0.05em] ml-2" for="first_name">Imię</label>
<input class="w-full px-6 py-4 rounded-md bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest text-on-surface transition-all duration-200 placeholder:text-on-surface-variant/40" id="first_name" placeholder="np. Jan" type="text"/>
</div>
<!-- Last Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-on-surface-variant uppercase tracking-[0.05em] ml-2" for="last_name">Nazwisko</label>
<input class="w-full px-6 py-4 rounded-md bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest text-on-surface transition-all duration-200 placeholder:text-on-surface-variant/40" id="last_name" placeholder="np. Kowalski" type="text"/>
</div>
</div>
</form>
</div>
<!-- Fruit Meter / Progress Indicator -->
<div class="mt-12 flex flex-col items-center gap-4 w-full max-w-xs">
<div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute left-0 top-0 h-full w-1/3 bg-melon-gradient rounded-full"></div>
</div>
<span class="text-sm font-bold text-primary tracking-widest uppercase">Krok 1 z 3</span>
</div>
</main>
<!-- Navigation Action Area -->
<footer class="fixed bottom-0 left-0 w-full p-8 flex justify-center pointer-events-none">
<div class="w-full max-w-2xl flex justify-center pointer-events-auto">
<button class="bg-melon-gradient text-white px-12 py-5 rounded-full font-extrabold text-xl shadow-[0_12px_32px_rgba(171,50,58,0.2)] hover:scale-105 active:scale-95 transition-all duration-300 flex items-center gap-3">
        Dalej
        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Floating Seed Accents -->
<div class="fixed top-20 left-[15%] w-8 h-8 rounded-full bg-on-surface opacity-5 pointer-events-none rotate-12"></div>
<div class="fixed bottom-40 right-[10%] w-12 h-12 rounded-xl bg-secondary opacity-5 pointer-events-none -rotate-12"></div>
<div class="fixed top-1/2 left-[5%] w-4 h-4 rounded-full bg-primary-container opacity-20 pointer-events-none"></div>
</body></html>
