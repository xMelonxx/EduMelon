<html lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#989f9f",
                        "primary-container": "#ff7074",
                        "on-tertiary-fixed": "#161d1d",
                        "primary-fixed": "#ffdad9",
                        "error-container": "#ffdad6",
                        "surface": "#f6faf6",
                        "on-tertiary-container": "#2f3636",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#410008",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#710116",
                        "outline": "#8b7170",
                        "surface-variant": "#dfe3e0",
                        "inverse-primary": "#ffb3b2",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#dde4e3",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#dfbfbe",
                        "surface-container-highest": "#dfe3e0",
                        "inverse-surface": "#2d312f",
                        "surface-container-high": "#e5e9e5",
                        "surface-tint": "#ab323a",
                        "on-surface": "#181d1a",
                        "tertiary-fixed-dim": "#c1c8c7",
                        "surface-container-low": "#f1f5f1",
                        "inverse-on-surface": "#eef2ee",
                        "on-tertiary-fixed-variant": "#414848",
                        "primary": "#ab323a",
                        "secondary": "#296a46",
                        "secondary-container": "#aef2c4",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#30704c",
                        "secondary-fixed": "#aef2c4",
                        "on-secondary-fixed": "#002110",
                        "primary-fixed-dim": "#ffb3b2",
                        "on-secondary-fixed-variant": "#095230",
                        "background": "#f6faf6",
                        "surface-container": "#ebefeb",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#92d5a9",
                        "tertiary": "#596060",
                        "on-background": "#181d1a",
                        "surface-bright": "#f6faf6",
                        "surface-dim": "#d7dbd7",
                        "on-surface-variant": "#584141",
                        "on-primary-fixed-variant": "#8a1925"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f6faf6;
        }
        .melon-gradient {
            background: linear-gradient(135deg, #ab323a 0%, #ff7074 100%);
        }
        .organic-blur {
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen text-on-surface overflow-x-hidden">
<!-- Celebratory Background Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] rounded-full bg-primary-container/10 blur-[100px]"></div>
</div>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 max-w-4xl mx-auto">
<!-- Header Celebration Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-24 h-24 mb-8 bg-secondary-container rounded-xl shadow-[0_12px_32px_rgba(171,50,58,0.08)]">
<span class="material-symbols-outlined text-on-secondary-container !text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-primary mb-4">Wszystko gotowe!</h1>
<p class="text-on-surface-variant text-lg max-w-md mx-auto">Twoje konto jest gotowe do nauki. Przygotowaliśmy dla Ciebie spersonalizowaną ścieżkę edukacyjną.</p>
</div>
<!-- Bento Grid Summary -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-12">
<!-- Summary Card 1: Identity -->
<div class="md:col-span-2 bg-surface-container-low p-8 rounded-xl relative overflow-hidden flex flex-col justify-between">
<div>
<span class="text-xs font-bold tracking-widest text-primary uppercase mb-4 block">Profil Studenta</span>
<h2 class="text-3xl font-bold text-on-surface mb-2">Anna Kowalska</h2>
<p class="text-secondary font-medium">Uniwersytet Warszawski</p>
</div>
<div class="mt-8 flex gap-3">
<div class="px-4 py-2 bg-surface-container-highest rounded-full text-sm font-semibold text-on-surface-variant">Informatyka</div>
<div class="px-4 py-2 bg-surface-container-highest rounded-full text-sm font-semibold text-on-surface-variant">Rok II</div>
</div>
<div class="absolute bottom-[-20px] right-[-20px] opacity-10">
<span class="material-symbols-outlined !text-[120px] text-on-surface">account_circle</span>
</div>
</div>
<!-- Summary Card 2: Status -->
<div class="bg-surface-container-highest p-8 rounded-xl flex flex-col items-center justify-center text-center">
<div class="w-20 h-2 w-full bg-surface-container-low rounded-full overflow-hidden mb-6">
<div class="h-full w-full melon-gradient"></div>
</div>
<span class="text-4xl font-extrabold text-primary mb-1">100%</span>
<span class="text-sm font-bold text-on-surface-variant uppercase tracking-wider">Konfiguracja</span>
</div>
</div>
<!-- Action Area -->
<div class="w-full max-w-sm flex flex-col gap-4">
<button class="melon-gradient text-white font-bold py-5 px-8 rounded-full shadow-[0_12px_32px_rgba(171,50,58,0.15)] hover:scale-[1.02] transition-all active:scale-95 text-xl flex items-center justify-center gap-3">
                Zacznijmy naukę!
                <span class="material-symbols-outlined">rocket_launch</span>
</button>
<button class="text-on-surface-variant font-semibold py-4 hover:text-primary transition-colors text-sm uppercase tracking-widest">
                Edytuj dane profilu
            </button>
</div>
<!-- Floating Seed Accents -->
<div class="absolute top-20 left-10 w-4 h-8 bg-on-surface rounded-full rotate-45 opacity-5 hidden lg:block"></div>
<div class="absolute bottom-40 right-20 w-6 h-12 bg-on-surface rounded-full -rotate-12 opacity-5 hidden lg:block"></div>
</main>
<!-- Navigation Shell (BottomNavBar equivalent from JSON) -->
<!-- Determined as active: "Complete" since this is the final onboarding step -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center gap-8 pb-8 pt-4 px-4 bg-white/80 dark:bg-emerald-950/80 backdrop-blur-xl shadow-[0_12px_32px_rgba(171,50,58,0.08)] rounded-t-[3rem]">
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 px-6 py-2 opacity-60 hover:scale-105 transition-transform duration-200 cursor-not-allowed">
<span class="material-symbols-outlined" data-icon="sparkles">colors_spark</span>
<span class="text-xs mt-1 font-medium">Start</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 px-6 py-2 opacity-60 hover:scale-105 transition-transform duration-200 cursor-not-allowed">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="text-xs mt-1 font-medium">Details</span>
</div>
<!-- Active Navigation: Complete -->
<div class="flex flex-col items-center justify-center bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-100 rounded-full px-6 py-2 transition-all duration-300 scale-95">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-xs mt-1 font-bold">Complete</span>
</div>
</nav>
</body></html>
